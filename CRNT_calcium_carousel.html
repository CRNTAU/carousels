<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#e8e8e8; }
  .slide {
    width:1080px;
    height:1350px;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:80px;
    font-family:'Poppins', sans-serif;
    color:#4764FD;
    margin:0 0 40px 0;
    position:relative;
    page-break-after: always;
  }
  .counter {
    font-family:'Space Mono', monospace;
    font-size:22px;
    letter-spacing:0.08em;
    color:#4764FD;
    position:absolute;
    top:80px;
    left:80px;
  }
  .rule {
    width:64px;
    height:2px;
    background:#4764FD;
    opacity:0.6;
    position:absolute;
    top:126px;
    left:80px;
  }
  .text {
    font-weight:800;
    font-size:70px;
    line-height:1.18;
    letter-spacing:-0.01em;
  }
  .sub {
    font-weight:600;
    font-size:32px;
    line-height:1.55;
    margin-top:32px;
    opacity:0.8;
  }
</style>
</head>
<body>
<div class="slide" data-document-role="page" data-label="Slide 1">
  <div class="counter">01 / 05</div>
  <div class="rule"></div>
  <div class="text">Almost no electrolyte brand includes calcium at all.</div>
</div>

<div class="slide" data-document-role="page" data-label="Slide 2">
  <div class="counter">02 / 05</div>
  <div class="rule"></div>
  <div class="text">It's essential for normal muscle contraction.</div>
</div>

<div class="slide" data-document-role="page" data-label="Slide 3">
  <div class="counter">03 / 05</div>
  <div class="rule"></div>
  <div class="text">It also supports normal nerve transmission.</div>
  <div class="sub">Not just bone health.</div>
</div>

<div class="slide" data-document-role="page" data-label="Slide 4">
  <div class="counter">04 / 05</div>
  <div class="rule"></div>
  <div class="text">Most competitors include none.</div>
  <div class="sub">CRNT has 60mg.</div>
</div>

<div class="slide" data-document-role="page" data-label="Slide 5">
  <div class="counter">05 / 05</div>
  <div class="rule"></div>
  <div class="text">Calcium 60mg.</div>
  <div class="sub">Drink. Done.</div>
</div>

</body>
</html>
